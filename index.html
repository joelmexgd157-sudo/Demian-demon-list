<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demian Demon List</title>
    <style>
        body{
            margin:0;
            background:#111827;
            color:white;
            font-family:Arial,sans-serif;
        }

        header{
            background:#1f2937;
            padding:20px;
            text-align:center;
            font-size:32px;
            font-weight:bold;
        }

        .sub{
            color:#9ca3af;
            font-size:16px;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:20px;
        }

        .level{
            background:#1f2937;
            margin:15px 0;
            border-radius:12px;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .rank{
            font-size:30px;
            font-weight:bold;
            color:#facc15;
        }

        .info h2{
            margin:0;
        }

        .info p{
            margin:5px 0;
            color:#d1d5db;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<header>
Demian Demon List
<div class="sub">Top Demonios del GDPS</div>
</header>

<div class="container">

<div class="level">
<div>
<div class="rank">#1</div>
<div class="info">
<h2>Bloodline</h2>
<p>Creador: Joelmex</p>
<p>Verificador: Joelmex</p>
</div>
</div>

<button>Ver video</button>

</div>

</div>

</body>
</html>
